# Nginx: PetFlow API en Hostinger (un solo Laravel en el dominio)
#
# Estructura en el VPS:
#   /var/www/petflow/backend/public   ← Laravel PetFlow
#
# Instalar:
#   sudo cp ops/nginx.hostinger.conf /etc/nginx/sites-available/petflow-api
#   sudo ln -sf /etc/nginx/sites-available/petflow-api /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default   # si choca
#   sudo nginx -t && sudo systemctl reload nginx
#
# URL: https://srv1197160.hstgr.cloud/api/v1/...

server {
    listen 80;
    server_name srv1197160.hstgr.cloud;

    root /var/www/petflow/backend/public;
    index index.php;

    client_max_body_size 25M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
