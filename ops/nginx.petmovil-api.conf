# Nginx: PetMovil / PetFlow API en Hostinger
#
# En el VPS:
#   sudo cp /var/www/petmovil/backend/ops/nginx.petmovil-api.conf \
#     /etc/nginx/sites-available/petmovil-api
#   sudo ln -sf /etc/nginx/sites-available/petmovil-api /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   # Desactiva configs viejas que usen el mismo server_name:
#   # sudo rm -f /etc/nginx/sites-enabled/petflow-api
#   sudo nginx -t && sudo systemctl reload nginx
#
# HTTPS (si ya tienes certbot):
#   sudo certbot --nginx -d srv1197160.hstgr.cloud

server {
    listen 80;
    listen [::]:80;
    server_name srv1197160.hstgr.cloud;

    root /var/www/petmovil/backend/public;
    index index.php;

    client_max_body_size 25M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
