# Nginx: varios backends Laravel en el MISMO VPS
#
# Recomendación: no compartir la misma URL raíz entre varios Laravel.
# Usa subdominios (más simple) o prefijos de ruta (más complejo).
#
# Estructura sugerida en /var/www:
#
#   /var/www/petflow/backend/          → srv1197160.hstgr.cloud/api/...
#   /var/www/otro-proyecto/backend/    → otro.srv1197160.hstgr.cloud/api/...
#
# Cada app tiene su propia BD, .env y carpeta storage.
# MySQL puede ser el mismo servidor con bases distintas (petflow, otro_proyecto).
#
# =============================================================================
# OPCIÓN A (RECOMENDADA): un subdominio por proyecto
# =============================================================================
#
# DNS en Hostinger (registros A apuntando a la IP del VPS):
#   srv1197160.hstgr.cloud      → IP del VPS  (PetFlow — principal)
#   otro.srv1197160.hstgr.cloud → misma IP    (segundo Laravel)
#
# Archivo: /etc/nginx/sites-available/otro-proyecto-api
#
# server {
#     listen 80;
#     server_name otro.srv1197160.hstgr.cloud;
#     root /var/www/otro-proyecto/backend/public;
#     index index.php;
#     client_max_body_size 25M;
#
#     location / {
#         try_files $uri $uri/ /index.php?$query_string;
#     }
#
#     location ~ \.php$ {
#         include snippets/fastcgi-php.conf;
#         fastcgi_pass unix:/run/php/php8.2-fpm.sock;
#         fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
#         include fastcgi_params;
#     }
# }
#
# En el .env del segundo proyecto:
#   APP_URL=https://otro.srv1197160.hstgr.cloud
#
# Frontend del segundo proyecto:
#   VITE_API_URL=https://otro.srv1197160.hstgr.cloud/api
#
# =============================================================================
# OPCIÓN B: un solo dominio, prefijo de ruta (solo si lo necesitas)
# =============================================================================
#
# PetFlow sigue en la raíz (/api/v1/...).
# Segundo Laravel bajo /otro-api/... (requiere ajustar APP_URL y rewrites).
#
# server {
#     listen 80;
#     server_name srv1197160.hstgr.cloud;
#
#     # PetFlow (principal)
#     location / {
#         root /var/www/petflow/backend/public;
#         try_files $uri $uri/ /index.php?$query_string;
#     }
#
#     location ~ ^/(index\.php)(/.*)?$ {
#         root /var/www/petflow/backend/public;
#         include snippets/fastcgi-php.conf;
#         fastcgi_pass unix:/run/php/php8.2-fpm.sock;
#         fastcgi_param SCRIPT_FILENAME /var/www/petflow/backend/public/$1;
#         fastcgi_param PATH_INFO $2;
#         include fastcgi_params;
#     }
#
#     # Segundo proyecto — prefijo /otro-api
#     location /otro-api {
#         alias /var/www/otro-proyecto/backend/public;
#         try_files $uri $uri/ @otro_api;
#     }
#     location @otro_api {
#         rewrite ^/otro-api/(.*)$ /otro-api/index.php?/$1 last;
#     }
#     location ~ ^/otro-api/index\.php(/.*)?$ {
#         include snippets/fastcgi-php.conf;
#         fastcgi_pass unix:/run/php/php8.2-fpm.sock;
#         fastcgi_param SCRIPT_FILENAME /var/www/otro-proyecto/backend/public/index.php;
#         fastcgi_param PATH_INFO $1;
#         include fastcgi_params;
#     }
# }
#
# Segundo .env:
#   APP_URL=https://srv1197160.hstgr.cloud/otro-api
#
# =============================================================================
# Deploy de cada proyecto (desde tu PC)
# =============================================================================
#
# PetFlow:
#   DEPLOY_PATH=/var/www/petflow/backend ./ops/deploy_hostinger.sh
#
# Otro proyecto:
#   DEPLOY_PATH=/var/www/otro-proyecto/backend ./ops/deploy_hostinger.sh
#   (copia deploy_hostinger.sh al otro repo o usa rsync manual)
